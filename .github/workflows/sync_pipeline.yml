name: TV Suape - Sincronização de Notícias

on:
  workflow_dispatch: # Permite execução manual
  schedule:
    # Executa a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'

jobs:
  sync-news:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Repositório
        uses: actions/checkout@v4

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Instalar dependências Python
        run: pip install -r requirements.txt

      - name: 4. Instalar browsers do Playwright
        run: python -m playwright install --with-deps chromium

      - name: 5. Executar o Pipeline de Sincronização
        env:
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
        run: python src/main.py

      - name: 6. Fazer Commit das alterações (imagens e index.html)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions-bot@github.com'
          git add -A
          # Verifica se há algo para comitar para evitar erro no workflow
          if git diff --staged --quiet; then
            echo "Nenhuma alteração para comitar."
          else
            git commit -m "chore(AUTOMATION): Atualiza notícias e imagens da TV Suape"
            git push
          fi
        # O push para a branch principal irá acionar o deploy automático da Vercel.