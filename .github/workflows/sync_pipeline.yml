name: TV Suape - Sincronização de Notícias

on:
  workflow_dispatch: # Permite execução manual
  schedule:
    # Executa a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'

jobs:
  sync-news:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Repositório
        uses: actions/checkout@v4

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Instalar dependências Python
        run: pip install -r requirements.txt

      - name: 4. Instalar browsers do Playwright
        run: python -m playwright install --with-deps chromium

      - name: 5. Executar o Pipeline de Sincronização
        env:
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py

      - name: 6. Deploy Direto no Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes