<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Atualização automática da página a cada 1 hora (3600 segundos) -->
    <meta http-equiv="refresh" content="3600">

    <title>Mural Digital - SUAPE</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reset.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/black.min.css">

    <style>
        body,
        html, 
        .reveal-viewport,
        .reveal {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent !important;
            /* Fundo da aplicação */
            background-color: black !important;
        }

        .reveal .backgrounds {
            background-color: transparent !important;
        }

        .logo-canto {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 9999;
            max-width: 250px; /* Ajuste o tamanho da logo conforme necessário */
            height: auto;
            pointer-events: none; /* Para não interferir caso alguém clique na tela */
        }

        .reveal {
            width: 100vw;
            height: 100vh;
        }

        .reveal .slides {
            width: 100% !important;
            height: 100% !important;
            transform: none !important;
            margin: 0 !important;
            position: absolute;
            top: 0;
            left: 0;
        }

        .reveal .slides section {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            top: 0 !important;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            /* Deixa o fundo do slide transparente para mostrar o background-image do body na lateral */
            background-color: transparent !important;
        }

        .area-interativa-botao {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 300px;
            height: 200px;
            z-index: 9998;
            /* Usado apenas para capturar o mouse, não visível */
        }

        .btn-fullscreen {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            font-family: sans-serif;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            opacity: 0; /* Começa invisível */
            transition: opacity 0.5s ease, background-color 0.3s ease;
            pointer-events: none; /* Evita cliques quando invisível */
        }

        .btn-fullscreen:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        /* Quando a área interativa detecta o mouse, o botão fica visível */
        .area-interativa-botao:hover + .btn-fullscreen,
        .btn-fullscreen:hover {
            opacity: 1;
            pointer-events: auto; /* Permite cliques */
        }
    </style>
</head>

<body>
    <!-- Logo fixa no canto superior esquerdo -->
    <img src="identidade_suape/logoSuape.png" alt="Logo Suape" class="logo-canto">

    <!-- Área invisível para detectar o mouse no canto -->
    <div class="area-interativa-botao"></div>
    
    <!-- Botão de Tela Cheia -->
    <button id="btn-fullscreen" class="btn-fullscreen" onclick="toggleFullScreen()">⛶ Tela Cheia</button>

    <div class="reveal">
        <div class="slides">
            {% if images %}
            {% for image in images %}
            <section data-background-image="{{ image }}" data-background-size="contain"></section>
            {% endfor %}
            {% else %}
            <section>
                <h2>Aguardando novas imagens...</h2>
            </section>
            {% endif %}
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.js"></script>
    <script>
        Reveal.initialize({
            hash: false,
            controls: false,
            progress: false,
            center: false,
            transition: 'fade',
            autoSlide: {{ slide_duration_ms }},
            loop: true,
            width: '100%',
            height: '100%',
            margin: 0,
            minScale: 1,
            maxScale: 1
        });

        function toggleFullScreen() {
            var doc = window.document;
            var docEl = doc.documentElement;

            var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                document.getElementById('btn-fullscreen').innerHTML = "✖ Sair da Tela Cheia";
            }
            else {
                cancelFullScreen.call(doc);
                document.getElementById('btn-fullscreen').innerHTML = "⛶ Tela Cheia";
            }
        }
    </script>
</body>

</html>
