<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Atualização automática da página a cada 1 hora (3600 segundos) -->
    <meta http-equiv="refresh" content="3600">

    <title>Mural Digital - SUAPE</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reset.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/black.min.css">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: black;
            /* Fundo da aplicação */
            background-image: url('identidade_suape/suapeDesktop.png');
            background-size: cover;
            background-position: center;
        }

        .logo-canto {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 9999;
            max-width: 250px; /* Ajuste o tamanho da logo conforme necessário */
            height: auto;
            pointer-events: none; /* Para não interferir caso alguém clique na tela */
        }

        .reveal {
            width: 100vw;
            height: 100vh;
        }

        .reveal .slides {
            width: 100% !important;
            height: 100% !important;
            transform: none !important;
            margin: 0 !important;
            position: absolute;
            top: 0;
            left: 0;
        }

        .reveal .slides section {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            top: 0 !important;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            /* Deixa o fundo do slide transparente para mostrar o background-image do body na lateral */
            background-color: transparent !important;
        }
    </style>
</head>

<body>
    <!-- Logo fixa no canto superior esquerdo -->
    <img src="identidade_suape/logoSuape.png" alt="Logo Suape" class="logo-canto">

    <div class="reveal">
        <div class="slides">
            {% if images %}
            {% for image in images %}
            <section data-background-image="{{ image }}" data-background-size="contain"></section>
            {% endfor %}
            {% else %}
            <section>
                <h2>Aguardando novas imagens...</h2>
            </section>
            {% endif %}
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.js"></script>
    <script>
        Reveal.initialize({
            hash: false,
            controls: false,
            progress: false,
            center: false,
            transition: 'fade',
            autoSlide: {{ slide_duration_ms }},
            loop: true,
            width: '100%',
            height: '100%',
            margin: 0,
            minScale: 1,
            maxScale: 1
        });
    </script>
</body>

</html>
